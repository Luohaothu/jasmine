[[permission]]
identifier = "allow-app-commands"
description = "Allows all Jasmine app invoke commands used by the UI."
commands.allow = [
  "get_webrtc_platform_info",
  "check_call_support",
  "start_discovery",
  "stop_discovery",
  "get_peers",
  "send_message",
  "send_call_join",
  "send_call_leave",
  "send_call_offer",
  "send_call_answer",
  "send_ice_candidate",
  "send_call_hangup",
  "send_call_reject",
  "get_messages",
  "get_reply_count",
  "get_reply_counts",
  "create_group",
  "add_group_members",
  "remove_group_members",
  "get_group_info",
  "list_groups",
  "leave_group",
  "fetch_og_metadata",
  "send_group_message",
  "edit_message",
  "delete_message",
  "send_file",
  "send_folder",
  "accept_file",
  "reject_file",
  "cancel_transfer",
  "resume_transfer",
  "retry_transfer",
  "accept_folder_transfer",
  "reject_folder_transfer",
  "cancel_folder_transfer",
  "get_transfers",
  "get_identity",
  "get_own_fingerprint",
  "get_peer_fingerprint",
  "toggle_peer_verified",
  "update_display_name",
  "update_avatar",
  "get_settings",
  "update_settings",
]
